repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: poe ruff
        language: system
        types: [python]
        pass_filenames: false

      - id: ruff-format
        name: ruff-format
        entry: poe ruff-format-check
        language: system
        types: [python]
        pass_filenames: false

      - id: mypy
        name: mypy
        entry: poe mypy
        language: system
        types: [python]
        pass_filenames: false
